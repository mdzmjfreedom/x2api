name: YouTube RSS Monitor

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: x2ding-db-writes
  cancel-in-progress: false

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      shard_index:
        description: '当前分片编号 0..N-1；默认读取仓库变量 YOUTUBE_MONITOR_SHARD_INDEX，否则 0'
        required: false
        default: ''
      shard_count:
        description: '总分片数；默认读取仓库变量 YOUTUBE_MONITOR_SHARD_COUNT，否则 1'
        required: false
        default: ''

jobs:
  monitor-youtube:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: collector/requirements.txt

      - name: Install dependencies
        working-directory: collector
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run YouTube monitor
        working-directory: collector
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SHARD_INDEX: ${{ inputs.shard_index || vars.YOUTUBE_MONITOR_SHARD_INDEX || '0' }}
          SHARD_COUNT: ${{ inputs.shard_count || vars.YOUTUBE_MONITOR_SHARD_COUNT || '1' }}
          RETENTION_DAYS: '30'
          MAX_RECORDS: '100000'
        run: |
          python twitter_monitor.py monitor-youtube \
            --shard-index "${SHARD_INDEX}" \
            --shard-count "${SHARD_COUNT}" \
            --retention-days "${RETENTION_DAYS}" \
            --max-records "${MAX_RECORDS}"
