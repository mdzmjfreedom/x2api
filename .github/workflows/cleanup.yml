name: Cleanup Stored Tweets

concurrency:
  group: x2ding-main-write
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      retention_days:
        description: '保留天数'
        required: false
        default: '30'
      max_records:
        description: '最大保留记录数'
        required: false
        default: '2000'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run cleanup
      run: |
        python twitter_monitor.py cleanup \
          --retention-days "${RETENTION_DAYS}" \
          --max-records "${MAX_RECORDS}"
      env:
        RETENTION_DAYS: ${{ inputs.retention_days || '30' }}
        MAX_RECORDS: ${{ inputs.max_records || '2000' }}

    - name: Commit and push if changed
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

        git add -A data

        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "chore: cleanup stored tweets [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
        fi
